<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – AuthFlow</title>

  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-bg">
  <div class="auth-card">

    <!-- Brand -->
    <div class="text-center mb-2">
      <div class="brand-mark mx-auto">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
        </svg>
      </div>
      <div class="brand-name">AuthFlow</div>
    </div>

    <!-- Icon illustration -->
    <div class="text-center mt-3 mb-2">
      <div style="
        width: 72px; height: 72px;
        background: linear-gradient(135deg, rgba(79,70,229,0.10), rgba(6,182,212,0.10));
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 2px dashed rgba(79,70,229,0.25);
      ">
        <i class="bi bi-lock" style="font-size: 1.75rem; color: var(--primary);"></i>
      </div>
    </div>

    <h1 class="auth-title text-center">Forgot password?</h1>
    <p class="auth-subtitle text-center">
      No worries — enter your email and we'll send you a reset link right away.
    </p>

    <!-- Success message (hidden by default) -->
    <div id="successMsg" class="auth-alert alert alert-success d-none" role="alert">
      <i class="bi bi-check-circle-fill"></i>
      <div>
        <strong>Email sent!</strong> Check your inbox for the reset link.
      </div>
    </div>

    <!-- Forgot Password Form -->
    <form id="forgotForm" novalidate>

      <!-- Email -->
      <div class="mb-4 form-group-animate">
        <label for="email" class="form-label">Email address</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
        <div class="invalid-feedback">Please enter a valid email address.</div>
        <div class="mt-2" style="font-size:0.8rem; color: var(--gray-light);">
          <i class="bi bi-info-circle me-1"></i>
          We'll send a password reset link to this address.
        </div>
      </div>

      <!-- Submit -->
      <div class="form-group-animate">
        <button type="submit" class="btn-primary-custom" id="submitBtn">
          <i class="bi bi-send me-2"></i>Send Reset Link
        </button>
      </div>

    </form>

    <!-- Navigation links -->
    <div class="auth-divider"><span>Remembered it?</span></div>

    <div class="text-center d-flex justify-content-center gap-4">
      <a href="index.html" class="auth-link" style="font-size:0.9rem;">
        <i class="bi bi-arrow-left me-1"></i>Back to Login
      </a>
      <a href="register.html" class="auth-link" style="font-size:0.9rem;">
        Create account <i class="bi bi-arrow-right ms-1"></i>
      </a>
    </div>

  </div>
</div>

<!-- Bootstrap 5 JS Bundle CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const form      = document.getElementById('forgotForm');
  const successMsg = document.getElementById('successMsg');
  const submitBtn  = document.getElementById('submitBtn');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!form.checkValidity()) {
      form.classList.add('was-validated');
      return;
    }

    // Simulate sending email
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Sending…';

    setTimeout(() => {
      form.classList.add('d-none');
      successMsg.classList.remove('d-none');
    }, 1500);
  });
</script>

</body>
</html>
