<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – AuthFlow</title>

  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="auth-bg">
  <div class="auth-card">

    <!-- Brand -->
    <div class="text-center mb-2">
      <div class="brand-mark mx-auto">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
        </svg>
      </div>
      <div class="brand-name">AuthFlow</div>
    </div>

    <h1 class="auth-title text-center mt-3">Welcome back</h1>
    <p class="auth-subtitle text-center">Sign in to your account to continue</p>

    <!-- Login Form -->
    <form id="loginForm" novalidate>

      <!-- Email -->
      <div class="mb-3 form-group-animate">
        <label for="email" class="form-label">Email address</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="you@example.com"
          required
          autocomplete="email"
        />
        <div class="invalid-feedback">Please enter a valid email address.</div>
      </div>

      <!-- Password -->
      <div class="mb-3 form-group-animate">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label for="password" class="form-label mb-0">Password</label>
          <a href="forgot-password.html" class="auth-link" style="font-size:0.82rem;">Forgot password?</a>
        </div>
        <div class="input-group">
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
          <button class="btn btn-outline-secondary" type="button" id="togglePassword" aria-label="Toggle password visibility">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
        <div class="invalid-feedback">Password is required.</div>
      </div>

      <!-- Remember Me -->
      <div class="mb-4 form-group-animate">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe" />
          <label class="form-check-label" for="rememberMe">Keep me signed in</label>
        </div>
      </div>

      <!-- Submit -->
      <div class="form-group-animate">
        <button type="submit" class="btn-primary-custom">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </div>

    </form>

    <!-- Divider -->
    <div class="auth-divider">
      <span>Don't have an account?</span>
    </div>

    <!-- Register Link -->
    <div class="text-center">
      <a href="register.html" class="auth-link" style="font-size:0.92rem;">
        Create a free account <i class="bi bi-arrow-right ms-1"></i>
      </a>
    </div>

  </div>
</div>

<!-- Bootstrap 5 JS Bundle CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Password visibility toggle
  const toggleBtn  = document.getElementById('togglePassword');
  const passwordEl = document.getElementById('password');
  const eyeIcon    = document.getElementById('eyeIcon');

  toggleBtn.addEventListener('click', () => {
    const isHidden = passwordEl.type === 'password';
    passwordEl.type = isHidden ? 'text' : 'password';
    eyeIcon.className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
  });

  // Form validation
  const form = document.getElementById('loginForm');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!form.checkValidity()) {
      form.classList.add('was-validated');
      return;
    }
    // Redirect to dashboard on success
    window.location.href = 'dashboard.html';
  });
</script>

</body>
</html>
